name: CodeQL

on:
  push:
    branches: [main, 'dev/**', 'feature/**', 'chore/**', 'ci/**']
  pull_request:
    branches: ['**']
  schedule:
    # Weekly Monday at 06:17 UTC — drift catches new CVEs in upstream packages.
    - cron: '17 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          # Skip SARIF upload to Code Scanning by default — repo owners can
          # toggle this to `always` once Code Scanning is enabled in
          # repo settings (https://github.com/<owner>/<repo>/settings/security_analysis).
          upload: never
